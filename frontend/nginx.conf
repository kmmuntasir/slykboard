# slykboard frontend — nginx static SPA server config.
# Mounted at /etc/nginx/conf.d/default.conf inside the nginx:alpine image.
#
# This container serves ONLY the static build. API calls are made from the
# browser to the separate backend host via VITE_API_BASE_URL (baked into the
# bundle at build time). No /api proxy by default (D2 / §9). An OPTIONAL
# /api reverse-proxy block is documented but disabled below.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client routes (createBrowserRouter, root "/") must resolve
    # to index.html. Without this, deep links / refreshes 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — Vite hashes filenames, so immutable long-term caching is safe.
    location ~* \.(?:js|css|woff2?|png|jpe?g|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Entry HTML must never be cached — always serve the latest hashed-asset manifest.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml
               application/javascript application/json
               application/xml application/xml+rss
               image/svg+xml;

    # Baseline security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- OPTIONAL /api reverse proxy (DISABLED by default) --------------------
    # Enable ONLY if you want to route API traffic through this same origin
    # instead of the browser calling the backend directly via VITE_API_BASE_URL.
    # To enable: set the upstream host and uncomment.
    #
    # location /api/ {
    #     proxy_pass http://backend:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
